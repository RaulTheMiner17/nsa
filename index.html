<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy 3 Months Nishmish💕</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@400;600&display=swap');

        body { margin: 0; overflow: hidden; background-color: #1a1020; font-family: 'Quicksand', 'Segoe UI', sans-serif; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        
        #ui-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(40, 20, 40, 0.92); 
            backdrop-filter: blur(12px);
            padding: 18px 22px; border-radius: 16px;
            box-shadow: 0 4px 30px rgba(180, 80, 120, 0.25);
            color: #f0dde6; width: auto; max-width: 280px; z-index: 100;
            border: 1px solid rgba(200, 120, 160, 0.3);
            touch-action: none;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        #ui-panel.hidden {
            opacity: 0; transform: translateX(-50%) translateY(-30px);
            pointer-events: none;
        }

        h2 { 
            margin: 0 0 6px 0; font-size: 1.3rem; 
            color: #f5b8d0; text-align: center; 
            font-family: 'Dancing Script', cursive; font-weight: 700;
            font-size: 1.6rem;
        }
        .subtitle {
            text-align: center; font-size: 0.8rem; color: #c98aaa;
            margin-bottom: 16px; font-style: italic;
        }
        


        button {
            width: 100%; padding: 12px; cursor: pointer;
            background: linear-gradient(135deg, #e07aaa 0%, #b84a8a 50%, #8a3a7a 100%);
            border: none; color: white; font-weight: 600;
            border-radius: 8px; transition: transform 0.1s, box-shadow 0.2s;
            font-family: 'Quicksand', sans-serif; font-size: 0.95rem;
            box-shadow: 0 2px 15px rgba(180, 80, 140, 0.3);
        }
        button:hover { box-shadow: 0 4px 25px rgba(200, 90, 150, 0.5); }
        button:active { transform: scale(0.98); }

        #status { 
            margin-top: 15px; padding: 10px; 
            background: rgba(30, 15, 30, 0.6); border-radius: 8px; 
            font-size: 0.85rem; text-align: center; min-height: 20px;
            border: 1px solid rgba(200, 120, 160, 0.15);
        }

        #canvas-container { width: 100vw; height: 100vh; }

        /* ---- Celebration Overlay ---- */
        #celebration-overlay {
            display: none;
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; pointer-events: none;
        }
        #celebration-overlay.active { display: block; }

        #love-message {
            display: none;
            position: fixed; top: 12%; left: 50%; transform: translateX(-50%) scale(0.7);
            z-index: 10000; text-align: center;
            opacity: 0; transition: opacity 1.2s ease, transform 1.2s ease;
            pointer-events: none;
        }
        #love-message.visible {
            display: block;
            opacity: 1; transform: translateX(-50%) scale(1);
        }
        #love-message .msg-box {
            background: rgba(40, 15, 35, 0.92);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(240, 150, 190, 0.4);
            border-radius: 24px;
            padding: 30px 36px;
            box-shadow: 0 8px 60px rgba(200, 80, 140, 0.4), 0 0 80px rgba(200, 80, 140, 0.15);
            max-width: 85vw;
        }
        #love-message .heart-big { font-size: 3rem; margin-bottom: 10px; }
        #love-message h1 {
            font-family: 'Dancing Script', cursive;
            color: #f5b8d0; font-size: 2.4rem; margin: 0 0 8px 0;
        }
        #love-message p {
            color: #d4a0be; font-size: 1.1rem; margin: 4px 0;
            font-family: 'Quicksand', sans-serif; line-height: 1.6;
        }
        #love-message .date {
            color: #e89aba; font-weight: 600; font-size: 0.95rem;
            margin-top: 16px; letter-spacing: 1px;
        }

        /* Floating hearts (celebration burst) */
        .float-heart {
            position: fixed; z-index: 9998;
            font-size: 1.4rem; opacity: 0;
            animation: floatUp 4s ease-in forwards;
            pointer-events: none;
        }
        @keyframes floatUp {
            0% { opacity: 0; transform: translateY(0) scale(0.5) rotate(0deg); }
            15% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1.2) rotate(30deg); }
        }

        /* Ambient glowing hearts */
        .glow-heart {
            position: fixed; z-index: 1; pointer-events: none;
            font-size: 1.2rem;
            filter: blur(1px);
            opacity: 0;
            animation: glowFloat linear infinite;
        }
        @keyframes glowFloat {
            0% { opacity: 0; transform: translateY(0) scale(0.6) rotate(0deg); }
            10% { opacity: 0.35; }
            50% { opacity: 0.2; }
            90% { opacity: 0.35; }
            100% { opacity: 0; transform: translateY(-110vh) scale(1.1) rotate(25deg); }
        }

        /* Mobile styles */
        @media (max-width: 600px) {
            #ui-panel { top: 10px; padding: 12px 18px; border-radius: 12px; }
            h2 { font-size: 1.3rem; margin-bottom: 4px; }
            .subtitle { margin-bottom: 10px; font-size: 0.75rem; }
            button { padding: 10px; font-size: 0.85rem; }
            #status { margin-top: 10px; padding: 8px; font-size: 0.78rem; }
            #love-message h1 { font-size: 1.6rem; }
            #love-message p { font-size: 0.9rem; }
            #love-message .msg-box { padding: 24px 20px; }
            #love-message .heart-big { font-size: 2.2rem; }
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

<div id="ui-panel">
    <h2>Happy 3 Months Nishmish 💕</h2>
    <div class="subtitle">Piece us together</div>

    <button id="startBtn">Start</button>
    
</div>

<!-- Celebration elements -->
<canvas id="celebration-overlay"></canvas>
<div id="love-message">
    <div class="msg-box">
        <div class="heart-big">🎉</div>
        <h1>yayayyy!💕</h1>
    </div>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Configuration ---
    const CONF = {
        boardSize: 20,       // World units width
        shadows: false
    };

    // --- State ---
    let scene, camera, renderer, controls;
    let pieces = [];
    let selectedPiece = null;
    let dragOffset = new THREE.Vector3();
    let puzzleGroup;
    let raycaster = new THREE.Raycaster();
    let mouse = new THREE.Vector2();
    let imageTexture = null;
    let imageAspect = 1.0;
    let currentSnapTolerance = 1.0;
    let pieceGrid = [];
    let dragGroup = [];
    let dragOffsets = [];
    let currentPieceWidth = 0;
    let currentPieceHeight = 0;
    let currentRows = 0;
    let currentCols = 0;
    
    init();
    animate();

    function init() {
        // Scene Setup
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1020); 

        // Camera - Orthographic for true 2D
        const aspect = window.innerWidth / window.innerHeight;
        const frustumSize = CONF.boardSize * 1.5; 
        camera = new THREE.OrthographicCamera(
            frustumSize * aspect / -2, 
            frustumSize * aspect / 2, 
            frustumSize / 2, 
            frustumSize / -2, 
            1, 1000
        );
        camera.position.set(0, 0, 10);
        camera.lookAt(0, 0, 0);

        // Renderer
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.domElement.style.touchAction = 'none';
        document.body.appendChild(renderer.domElement);

        // Background Board Grid
        const gridHelper = new THREE.GridHelper(CONF.boardSize * 2, CONF.boardSize * 2, 0x3a2040, 0x2a1530);
        gridHelper.rotation.x = Math.PI / 2; // Rotate to face camera
        gridHelper.position.z = -1;
        scene.add(gridHelper);

        // Controls
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableRotate = false; // 2D only
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.mouseButtons = {
            LEFT: THREE.MOUSE.PAN, 
            MIDDLE: THREE.MOUSE.DOLLY,
            RIGHT: THREE.MOUSE.PAN
        };
        controls.touches = {
            ONE: THREE.TOUCH.PAN,
            TWO: THREE.TOUCH.DOLLY_PAN
        };

        // Listeners
        window.addEventListener('resize', onResize);
        renderer.domElement.addEventListener('pointerdown', onPointerDown);
        renderer.domElement.addEventListener('pointermove', onPointerMove);
        renderer.domElement.addEventListener('pointerup', onPointerUp);
        renderer.domElement.addEventListener('pointercancel', onPointerUp);
        // Prevent context menu on long press (mobile)
        renderer.domElement.addEventListener('contextmenu', e => e.preventDefault());
        document.getElementById('startBtn').addEventListener('click', onGenerateClick);
    }

    function onGenerateClick() {
        // Hide the UI panel
        const panel = document.getElementById('ui-panel');
        panel.classList.add('hidden');
        setTimeout(() => { panel.style.display = 'none'; }, 700);

        // Start ambient glowing hearts
        startAmbientHearts();

        updateStatus("Loading image...", false);
        const loader = new THREE.TextureLoader();
        loader.load('img.jpg', (tex) => {
            imageTexture = tex;
            imageTexture.minFilter = THREE.LinearFilter;
            imageAspect = tex.image.width / tex.image.height;
            createPuzzle();
        }, undefined, () => {
            // Show panel again if image fails
            panel.style.display = '';
            panel.classList.remove('hidden');
            updateStatus("Could not load img.jpg — make sure it's in the same folder!", true);
        });
    }

    let ambientInterval = null;
    function startAmbientHearts() {
        if (ambientInterval) return;
        const hearts = ['💕', '💖', '💗', '🩷', '✨', '❤️'];
        // Spawn initial batch
        for (let i = 0; i < 8; i++) {
            setTimeout(() => spawnGlowHeart(hearts), i * 400);
        }
        // Keep spawning
        ambientInterval = setInterval(() => spawnGlowHeart(hearts), 1800);
    }

    function spawnGlowHeart(hearts) {
        const el = document.createElement('div');
        el.className = 'glow-heart';
        el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
        el.style.left = (Math.random() * 96 + 2) + 'vw';
        el.style.bottom = '-30px';
        const size = 0.8 + Math.random() * 1.4;
        el.style.fontSize = size + 'rem';
        const duration = 8 + Math.random() * 10;
        el.style.animationDuration = duration + 's';
        el.style.animationDelay = (Math.random() * 2) + 's';
        // Subtle glow color
        const hue = 320 + Math.random() * 40;
        el.style.textShadow = `0 0 ${8 + Math.random() * 12}px hsla(${hue}, 80%, 65%, 0.6)`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), (duration + 3) * 1000);
    }

    function createPuzzle() {
        if (puzzleGroup) scene.remove(puzzleGroup);
        puzzleGroup = new THREE.Group();
        pieces = [];
        pieceGrid = [];

        const cols = 4;
        const rows = 4;
        currentRows = rows;
        currentCols = cols;
        
        // Calculate Puzzle Dimensions
        let puzzleWidth, puzzleHeight;
        if (imageAspect >= 1) {
            puzzleWidth = CONF.boardSize;
            puzzleHeight = CONF.boardSize / imageAspect;
        } else {
            puzzleHeight = CONF.boardSize;
            puzzleWidth = CONF.boardSize * imageAspect;
        }

        const pieceWidth = puzzleWidth / cols;
        const pieceHeight = puzzleHeight / rows;
        currentPieceWidth = pieceWidth;
        currentPieceHeight = pieceHeight;

        // --- DYNAMIC SNAP DISTANCE ---
        currentSnapTolerance = Math.min(pieceWidth, pieceHeight) * 0.5;

        // Generate Jigsaw Connections Matrix
        const vTabs = []; 
        for(let r=0; r<rows; r++) {
            let rowTabs = [];
            for(let c=0; c<cols-1; c++) rowTabs.push(Math.random() > 0.5 ? 1 : -1);
            vTabs.push(rowTabs);
        }
        const hTabs = [];
        for(let r=0; r<rows-1; r++) {
            let rowTabs = [];
            for(let c=0; c<cols; c++) rowTabs.push(Math.random() > 0.5 ? 1 : -1);
            hTabs.push(rowTabs);
        }

        // Create Pieces
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                
                const top = (y === 0) ? 0 : -hTabs[y-1][x];
                const bottom = (y === rows-1) ? 0 : hTabs[y][x];
                const left = (x === 0) ? 0 : -vTabs[y][x-1];
                const right = (x === cols-1) ? 0 : vTabs[y][x];

                const shape = createJigsawShape(pieceWidth, pieceHeight, top, right, bottom, left);

                // Use ShapeGeometry for 2D flat pieces
                const geometry = new THREE.ShapeGeometry(shape);
                
                // --- FIXED UV MAPPING & CENTERING ---
                geometry.translate(-pieceWidth / 2, -pieceHeight / 2, 0);

                const posAttribute = geometry.attributes.position;
                const uvAttribute = geometry.attributes.uv; 
                
                const targetX = (x - cols/2) * pieceWidth + pieceWidth/2;
                const targetY = -(y - rows/2) * pieceHeight - pieceHeight/2; 

                for (let i = 0; i < posAttribute.count; i++) {
                    const lx = posAttribute.getX(i);
                    const ly = posAttribute.getY(i);
                    
                    // Map local vertex to world position in solved state
                    const worldX = lx + targetX;
                    const worldY = ly + targetY;

                    // Map to 0..1 UV space
                    let u = (worldX + puzzleWidth/2) / puzzleWidth;
                    let v = (worldY + puzzleHeight/2) / puzzleHeight;

                    uvAttribute.setXY(i, u, v);
                }
                
                // Material
                const material = new THREE.MeshBasicMaterial({ 
                    map: imageTexture,
                    side: THREE.DoubleSide
                });
                
                const mesh = new THREE.Mesh(geometry, material);

                // Create Outline
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 1, opacity: 0.3, transparent: true }));
                line.position.z = 0.01; 
                mesh.add(line);

                mesh.userData = {
                    isPiece: true,
                    correctPos: new THREE.Vector3(targetX, targetY, 0),
                    isLocked: false,
                    row: y,
                    col: x,
                    groupId: y * cols + x
                };

                if (!pieceGrid[y]) pieceGrid[y] = [];
                pieceGrid[y][x] = mesh;

                // Scatter Logic
                const scatterRange = CONF.boardSize * 1.2;
                mesh.position.set(
                    (Math.random() - 0.5) * scatterRange,
                    (Math.random() - 0.5) * scatterRange,
                    0
                );
                
                mesh.rotation.z = 0; // No random rotation

                pieces.push(mesh);
                puzzleGroup.add(mesh);
            }
        }
        
        scene.add(puzzleGroup);
        
        // Fit camera
        const aspect = window.innerWidth / window.innerHeight;
        const boardMax = Math.max(puzzleWidth, puzzleHeight) * 1.5;
        camera.left = -boardMax * aspect / 2;
        camera.right = boardMax * aspect / 2;
        camera.top = boardMax / 2;
        camera.bottom = -boardMax / 2;
        camera.updateProjectionMatrix();
    }

    // --- Group Helper ---
    function getGroup(piece) {
        return pieces.filter(p => p.userData.groupId === piece.userData.groupId);
    }

    function playSnapSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.value = 680;
            gain.gain.value = 0.12;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.07);
            osc.stop(ctx.currentTime + 0.07);
        } catch(e) {}
    }

    // --- Shape Generator (2D) ---
    function createJigsawShape(w, h, top, right, bottom, left) {
        const shape = new THREE.Shape();
        const tabSize = Math.min(w, h) * 0.22;
        
        // Start Top-Left
        shape.moveTo(0, h);

        // Top
        if (top === 0) shape.lineTo(w, h);
        else drawTab(shape, 0, h, w, h, top, tabSize); 

        // Right
        if (right === 0) shape.lineTo(w, 0);
        else drawTab(shape, w, h, w, 0, right, tabSize);

        // Bottom
        if (bottom === 0) shape.lineTo(0, 0);
        else drawTab(shape, w, 0, 0, 0, bottom, tabSize);

        // Left
        if (left === 0) shape.lineTo(0, h);
        else drawTab(shape, 0, 0, 0, h, left, tabSize);

        return shape;
    }

    function drawTab(shape, x1, y1, x2, y2, sign, size) {
        const midX = (x1 + x2) / 2;
        const midY = (y1 + y2) / 2;
        
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.sqrt(dx*dx + dy*dy);
        
        const nx = -dy / len;
        const ny = dx / len;
        
        const neckWidth = 0.2 * len;
        const tipDist = size;
        
        const p1x = x1 + dx * 0.5 - dx * (neckWidth/len) * 0.5;
        const p1y = y1 + dy * 0.5 - dy * (neckWidth/len) * 0.5;
        
        const p2x = x1 + dx * 0.5 + dx * (neckWidth/len) * 0.5;
        const p2y = y1 + dy * 0.5 + dy * (neckWidth/len) * 0.5;
        
        const tipX = midX + nx * tipDist * sign;
        const tipY = midY + ny * tipDist * sign;
        
        const cp1x = p1x + nx * (size * 0.2) * sign;
        const cp1y = p1y + ny * (size * 0.2) * sign;
        
        const cp2x = p2x + nx * (size * 0.2) * sign;
        const cp2y = p2y + ny * (size * 0.2) * sign;
        
        const dirX = dx / len;
        const dirY = dy / len;
        
        const tipCp1x = tipX - dirX * (size * 0.6);
        const tipCp1y = tipY - dirY * (size * 0.6);
        
        const tipCp2x = tipX + dirX * (size * 0.6);
        const tipCp2y = tipY + dirY * (size * 0.6);

        shape.lineTo(p1x, p1y);
        shape.bezierCurveTo(cp1x, cp1y, tipCp1x, tipCp1y, tipX, tipY);
        shape.bezierCurveTo(tipCp2x, tipCp2y, cp2x, cp2y, p2x, p2y);
        shape.lineTo(x2, y2);
    }

    // --- Interaction ---
    function onPointerDown(event) {
        if (!puzzleGroup) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const intersects = raycaster.intersectObjects(pieces);
        
        if (intersects.length > 0) {
            intersects.sort((a, b) => b.object.position.z - a.object.position.z);

            for (let i = 0; i < intersects.length; i++) {
                let hit = intersects[i].object;
                if (hit.type === 'LineSegments') hit = hit.parent;

                if (hit.userData.isPiece && !hit.userData.isLocked) {
                    controls.enabled = false;
                    selectedPiece = hit;
                    
                    const pt = intersects[i].point;

                    // Get entire group and store offsets from click point
                    dragGroup = getGroup(hit);
                    dragOffsets = dragGroup.map(p => ({
                        piece: p,
                        dx: p.position.x - pt.x,
                        dy: p.position.y - pt.y
                    }));
                    
                    // Lift all pieces in group
                    for (const p of dragGroup) {
                        p.position.z = 2;
                        p.renderOrder = 999;
                    }
                    break;
                }
            }
        }
    }

    function onPointerMove(event) {
        if (!selectedPiece || dragGroup.length === 0) return;

        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        
        const plane = new THREE.Plane(new THREE.Vector3(0,0,1), 0);
        const target = new THREE.Vector3();
        raycaster.ray.intersectPlane(plane, target);
        
        if (target) {
            for (const item of dragOffsets) {
                item.piece.position.x = target.x + item.dx;
                item.piece.position.y = target.y + item.dy;
            }
        }
    }

    function onPointerUp() {
        if (!selectedPiece) return;

        let snappedAny = false;

        // --- Iterative neighbor snapping (cascade) ---
        let didSnap = true;
        let safety = 0;
        while (didSnap && safety < pieces.length) {
            safety++;
            didSnap = false;
            const group = getGroup(selectedPiece);

            for (const piece of group) {
                const r = piece.userData.row;
                const c = piece.userData.col;
                const neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];

                for (const [nr, nc] of neighbors) {
                    if (nr < 0 || nr >= currentRows || nc < 0 || nc >= currentCols) continue;
                    const neighbor = pieceGrid[nr][nc];
                    if (neighbor.userData.groupId === piece.userData.groupId) continue;

                    // Expected relative position of neighbor from this piece
                    const expectedDx = (nc - c) * currentPieceWidth;
                    const expectedDy = -(nr - r) * currentPieceHeight;

                    // Actual relative position
                    const actualDx = neighbor.position.x - piece.position.x;
                    const actualDy = neighbor.position.y - piece.position.y;

                    const errX = actualDx - expectedDx;
                    const errY = actualDy - expectedDy;
                    const err = Math.sqrt(errX * errX + errY * errY);

                    if (err < currentSnapTolerance) {
                        const neighborGroup = getGroup(neighbor);
                        const neighborLocked = neighborGroup.some(p => p.userData.isLocked);

                        // Move our (dropped) group to align with the neighbor group
                        const moveX = (neighbor.position.x - expectedDx) - piece.position.x;
                        const moveY = (neighbor.position.y - expectedDy) - piece.position.y;
                        for (const gp of group) {
                            gp.position.x += moveX;
                            gp.position.y += moveY;
                        }

                        // Merge groups under neighbor's groupId
                        const newGroupId = neighbor.userData.groupId;
                        const shouldLock = neighborLocked || group.some(p => p.userData.isLocked);
                        for (const gp of group) {
                            gp.userData.groupId = newGroupId;
                        }

                        // If either group was locked, lock entire merged group at correct positions
                        if (shouldLock) {
                            const merged = getGroup(neighbor);
                            for (const gp of merged) {
                                gp.position.copy(gp.userData.correctPos);
                                gp.userData.isLocked = true;
                            }
                        }

                        snappedAny = true;
                        didSnap = true;
                        break;
                    }
                }
                if (didSnap) break;
            }
        }

        // --- Also check absolute position snap ---
        const finalGroup = getGroup(selectedPiece);
        if (!finalGroup.some(p => p.userData.isLocked)) {
            for (const piece of finalGroup) {
                const dx = piece.position.x - piece.userData.correctPos.x;
                const dy = piece.position.y - piece.userData.correctPos.y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < currentSnapTolerance) {
                    // Lock entire group at correct absolute positions
                    for (const gp of finalGroup) {
                        gp.position.copy(gp.userData.correctPos);
                        gp.userData.isLocked = true;
                    }
                    snappedAny = true;
                    break;
                }
            }
        }

        // --- Set z-position and outlines ---
        const settledGroup = getGroup(selectedPiece);
        for (const gp of settledGroup) {
            if (gp.userData.isLocked) {
                gp.position.z = -0.01;
                gp.renderOrder = 0;
                const outline = gp.children.find(c => c.type === 'LineSegments');
                if (outline) outline.visible = false;
            } else {
                gp.position.z = 0;
                gp.renderOrder = 1;
            }
        }

        if (snappedAny) playSnapSound();

        // --- Win check ---
        if (pieces.length > 0 && pieces.every(p => p.userData.isLocked)) {
            updateStatus("💕 You completed our puzzle! 💕", false);
            triggerCelebration();
        }

        selectedPiece = null;
        dragGroup = [];
        dragOffsets = [];
        controls.enabled = true;
    }

    function onResize() {
        const aspect = window.innerWidth / window.innerHeight;
        const frustumHeight = (camera.top - camera.bottom);
        const frustumWidth = frustumHeight * aspect;
        
        camera.left = -frustumWidth / 2;
        camera.right = frustumWidth / 2;
        camera.updateProjectionMatrix();
        
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
    
    function updateStatus(msg, isError) {
        const el = document.getElementById('status');
        if (!el) return;
        el.textContent = msg;
        el.style.color = isError ? '#ff6b6b' : '#fff';
    }

    function animate() {
        requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
    }

    // ========== CELEBRATION SYSTEM ==========

    function triggerCelebration() {
        // 1. Hearts floating up from bottom
        spawnFloatingHearts();

        // 2. Confetti canvas
        launchConfetti();

        // 3. Love message after delay
        setTimeout(() => {
            const msg = document.getElementById('love-message');
            msg.style.display = 'block';
            // Force reflow for transition
            msg.offsetHeight;
            msg.classList.add('visible');

            // Hide after 4 seconds
            setTimeout(() => {
                msg.classList.remove('visible');
                setTimeout(() => { msg.style.display = 'none'; }, 1200);
            }, 4000);
        }, 1800);

        // Play celebration sound
        playCelebrationSound();
    }

    function spawnFloatingHearts() {
        const hearts = ['💕', '💖', '💗', '💘', '❤️', '🩷', '✨', '💝'];
        let count = 0;
        const interval = setInterval(() => {
            if (count >= 40) { clearInterval(interval); return; }
            const el = document.createElement('div');
            el.className = 'float-heart';
            el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.bottom = '-40px';
            el.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
            el.style.animationDuration = (3 + Math.random() * 3) + 's';
            el.style.animationDelay = (Math.random() * 0.3) + 's';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 7000);
            count++;
        }, 120);
    }

    function launchConfetti() {
        const canvas = document.getElementById('celebration-overlay');
        canvas.classList.add('active');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');

        const particles = [];
        const colors = ['#ff6b9d', '#c44dff', '#ff4d8d', '#ffa0c4', '#ff85b3',
                         '#e060a0', '#ffd0e0', '#ff3388', '#ff70a0', '#ffc0d0',
                         '#ffaacc', '#ee5599', '#ff90b8', '#f5b8d0', '#e8a0c0'];

        for (let i = 0; i < 200; i++) {
            particles.push({
                x: window.innerWidth / 2 + (Math.random() - 0.5) * 200,
                y: window.innerHeight / 2,
                vx: (Math.random() - 0.5) * 18,
                vy: (Math.random() - 0.8) * 18,
                w: 4 + Math.random() * 6,
                h: 8 + Math.random() * 8,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                rotSpeed: (Math.random() - 0.5) * 12,
                gravity: 0.12 + Math.random() * 0.08,
                opacity: 1,
                shape: Math.random() > 0.3 ? 'rect' : 'heart'
            });
        }

        let frame = 0;
        function drawConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = 0;

            for (const p of particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += p.gravity;
                p.vx *= 0.99;
                p.rotation += p.rotSpeed;

                if (frame > 60) p.opacity -= 0.008;
                if (p.opacity <= 0) continue;
                alive++;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.globalAlpha = Math.max(0, p.opacity);

                if (p.shape === 'heart') {
                    drawHeart(ctx, 0, 0, p.w * 1.5, p.color);
                } else {
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                }

                ctx.restore();
            }

            frame++;
            if (alive > 0 && frame < 300) {
                requestAnimationFrame(drawConfetti);
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                canvas.classList.remove('active');
            }
        }
        requestAnimationFrame(drawConfetti);
    }

    function drawHeart(ctx, x, y, size, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        const s = size / 2;
        ctx.moveTo(x, y + s * 0.3);
        ctx.bezierCurveTo(x, y - s * 0.5, x - s, y - s * 0.5, x - s, y + s * 0.1);
        ctx.bezierCurveTo(x - s, y + s * 0.6, x, y + s, x, y + s * 1.2);
        ctx.bezierCurveTo(x, y + s, x + s, y + s * 0.6, x + s, y + s * 0.1);
        ctx.bezierCurveTo(x + s, y - s * 0.5, x, y - s * 0.5, x, y + s * 0.3);
        ctx.fill();
    }

    function playCelebrationSound() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523, 659, 784, 1047]; // C5 E5 G5 C6 – ascending chord
            notes.forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
                gain.gain.linearRampToValueAtTime(0.08, ctx.currentTime + i * 0.15 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.6);
                osc.start(ctx.currentTime + i * 0.15);
                osc.stop(ctx.currentTime + i * 0.15 + 0.6);
            });
        } catch(e) {}
    }

</script>
